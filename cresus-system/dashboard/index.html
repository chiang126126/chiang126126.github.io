<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Crésus 信号看板</title>
<style>
  :root {
    --bg: #0b0f17;
    --panel: #131a26;
    --panel-2: #1a2332;
    --border: #243047;
    --text: #e6edf6;
    --text-dim: #8a96aa;
    --green: #00c853;
    --red: #ff1744;
    --yellow: #ffd600;
    --blue: #2196f3;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 { margin: 0; font-size: 22px; font-weight: 600; }
  header .meta { color: var(--text-dim); font-size: 13px; }
  main { padding: 24px 32px 64px; max-width: 1280px; margin: 0 auto; }

  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }
  .stat {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
  }
  .stat .label { color: var(--text-dim); font-size: 12px; margin-bottom: 6px; }
  .stat .value { font-size: 24px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .stat.long  .value { color: var(--green); }
  .stat.short .value { color: var(--red); }
  .stat.watch .value { color: var(--yellow); }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .panel h2 {
    margin: 0;
    padding: 16px 20px;
    font-size: 15px;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    background: var(--panel-2);
  }
  .panel-body { padding: 16px 20px; }

  /* histogram */
  .histogram {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 120px;
    padding: 8px 0;
  }
  .bar {
    flex: 1;
    background: var(--blue);
    border-radius: 3px 3px 0 0;
    min-height: 2px;
    position: relative;
    cursor: default;
  }
  .bar:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: #000;
    color: #fff;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 11px;
    white-space: nowrap;
    margin-bottom: 4px;
  }
  .axis {
    display: flex;
    gap: 4px;
    margin-top: 6px;
    color: var(--text-dim);
    font-size: 10px;
  }
  .axis span { flex: 1; text-align: center; overflow: hidden; }

  /* table */
  #table-wrap, #positions-table, #history-table { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 760px; }
  th, td {
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  /* sticky time + symbol on signals/closed tables */
  #table-wrap table td:nth-child(1),
  #history-table table td:nth-child(1) {
    position: sticky; left: 0; background: var(--panel); z-index: 1;
    min-width: 90px;
  }
  #table-wrap table td:nth-child(2),
  #history-table table td:nth-child(2) {
    position: sticky; left: 90px; background: var(--panel); z-index: 1;
    border-right: 1px solid var(--border);
    min-width: 100px;
  }
  #table-wrap table th:nth-child(1),
  #history-table table th:nth-child(1) { position: sticky; left: 0; z-index: 3; }
  #table-wrap table th:nth-child(2),
  #history-table table th:nth-child(2) { position: sticky; left: 90px; z-index: 3; border-right: 1px solid var(--border); }
  /* sticky symbol on positions table */
  #positions-table table td:nth-child(1) {
    position: sticky; left: 0; background: var(--panel); z-index: 1;
    border-right: 1px solid var(--border); min-width: 100px;
  }
  #positions-table table th:nth-child(1) { position: sticky; left: 0; z-index: 3; border-right: 1px solid var(--border); }
  th {
    background: var(--panel-2);
    color: var(--text-dim);
    font-weight: 500;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    position: sticky;
    top: 0;
  }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge.LONG  { background: rgba(0,200,83,0.15);  color: var(--green); }
  .badge.SHORT { background: rgba(255,23,68,0.15); color: var(--red); }
  .badge.WATCH { background: rgba(255,214,0,0.15); color: var(--yellow); }

  .conf {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(33,150,243,0.15);
    color: var(--blue);
    font-weight: 600;
  }

  .filters { display: flex; gap: 8px; padding: 12px 20px; background: var(--panel-2); border-bottom: 1px solid var(--border); }
  .filters button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }
  .filters button.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .filter-sep { color: var(--text-dim); padding: 0 4px; align-self: center; }

  .history-toggle {
    text-align: center;
    padding: 14px;
    color: var(--blue);
    cursor: pointer;
    font-size: 13px;
    border-top: 1px solid var(--border);
    user-select: none;
    transition: background 0.15s;
  }
  .history-toggle:hover { background: var(--panel-2); }

  tr.outside-24h td { opacity: 0.55; background: rgba(0,0,0,0.15); }
  tr.outside-24h td:first-child::before { content: "↥ "; color: var(--text-dim); }

  .history-recap {
    padding: 12px 14px;
    background: var(--panel-2);
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
  }
  .history-recap strong { color: var(--text); font-variant-numeric: tabular-nums; }

  .refresh-btn {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    margin-left: 10px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.15s;
    line-height: 1;
  }
  .refresh-btn:hover { background: var(--blue); border-color: var(--blue); color: #fff; }
  .refresh-btn:active { transform: scale(0.92); }
  .refresh-btn.spinning { animation: spin 0.8s linear infinite; pointer-events: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .filters input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    margin-left: auto;
    min-width: 160px;
  }

  .empty, .error { padding: 40px; text-align: center; color: var(--text-dim); }
  .error { color: var(--red); }
  code { background: var(--panel-2); padding: 2px 6px; border-radius: 4px; font-size: 12px; }

  .pnl-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }
  .pnl-card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .pnl-card .label { color: var(--text-dim); font-size: 12px; margin-bottom: 6px; }
  .pnl-card .value {
    font-size: 22px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .pnl-card .sub { color: var(--text-dim); font-size: 11px; margin-top: 4px; }
  .pnl-positive { color: var(--green); }
  .pnl-negative { color: var(--red); }

  .meta-inline { font-size: 12px; color: var(--text-dim); font-weight: normal; margin-left: 8px; }

  .pnl-cell { font-variant-numeric: tabular-nums; font-weight: 600; }

  /* P19 信号状态机 + 距现价% */
  .dist-pct {
    font-size: 11px;
    font-weight: 500;
    margin-left: 3px;
    font-variant-numeric: tabular-nums;
    opacity: 0.85;
  }
  .dist-pos { color: var(--green); }
  .dist-neg { color: var(--red); }
  .dist-warn { color: var(--yellow); }

  /* 决策信号 v2 — card grid */
  .d-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 14px;
  }
  .d-card {
    background: rgba(10,15,26,0.7);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: box-shadow 0.2s;
  }
  .d-card:hover { box-shadow: 0 2px 16px rgba(0,0,0,0.35); }
  .d-card-header { display: flex; justify-content: space-between; align-items: center; }
  .d-symbol { font-size: 15px; font-weight: 700; letter-spacing: 0.3px; }
  .d-verdict {
    padding: 7px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    letter-spacing: 0.3px;
  }
  .d-conf-row { display: flex; align-items: center; gap: 8px; }
  .d-conf-label { font-size: 11px; color: var(--text-dim); min-width: 36px; }
  .d-conf-bar-wrap { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .d-conf-bar { height: 100%; border-radius: 3px; }
  .d-conf-num { font-size: 13px; font-weight: 700; min-width: 26px; text-align: right; font-variant-numeric: tabular-nums; }
  .d-levels {
    display: flex;
    flex-direction: column;
    gap: 5px;
    background: rgba(0,0,0,0.25);
    border-radius: 8px;
    padding: 9px 11px;
  }
  .d-level-row { display: flex; align-items: center; gap: 6px; font-size: 12px; font-variant-numeric: tabular-nums; }
  .d-level-label { font-size: 10px; font-weight: 700; min-width: 28px; text-transform: uppercase; letter-spacing: 0.6px; opacity: 0.75; }
  .d-level-price { font-weight: 600; color: var(--text); }
  .d-card-footer {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    padding-top: 6px;
    border-top: 1px solid var(--border);
    font-size: 11px;
  }
  .d-regime-tag { margin-left: auto; font-weight: 600; font-size: 10px; }
  @media (max-width: 720px) {
    .d-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  }
  @media (max-width: 420px) {
    .d-grid { grid-template-columns: 1fr; }
  }

  .struct-row {
    display: grid;
    grid-template-columns: 28px 110px 1fr 60px 50px 140px 90px;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .struct-row:last-child { border-bottom: none; }
  .struct-letter {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    color: #fff;
    font-size: 13px;
  }
  .struct-bar-wrap {
    height: 8px;
    background: var(--panel-2);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .struct-bar { height: 100%; border-radius: 4px; }
  .struct-count { font-variant-numeric: tabular-nums; font-weight: 600; text-align: right; }
  .struct-pct { color: var(--text-dim); font-size: 12px; text-align: right; }
  .struct-dir { color: var(--text-dim); font-size: 11px; }
  .struct-conf { font-variant-numeric: tabular-nums; color: var(--blue); font-weight: 600; text-align: right; }

  /* mobile responsive */
  @media (max-width: 720px) {
    header { padding: 16px 14px; }
    header h1 { font-size: 18px; }
    main { padding: 14px 12px 48px; }
    .panel h2 { font-size: 14px; padding: 12px 14px; }
    .panel-body { padding: 12px 14px; }
    .stats { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .stat { padding: 12px 14px; }
    .stat .value { font-size: 20px; }
    .pnl-stats { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .pnl-card { padding: 10px 12px; }
    .pnl-card .value { font-size: 18px; }
    .filters { flex-wrap: wrap; padding: 10px 14px; gap: 6px; }
    .filters input { width: 100%; margin-left: 0; min-width: 0; margin-top: 6px; }
    .filters button { padding: 4px 10px; font-size: 11px; }
    th, td { padding: 8px 10px; font-size: 12px; }
    table { min-width: 720px; }
    .struct-row {
      grid-template-columns: 28px 1fr auto;
      gap: 6px 10px;
      padding: 10px 0;
      font-size: 12px;
    }
    .struct-row > :nth-child(1) { grid-column: 1; grid-row: 1 / 3; align-self: center; }
    .struct-row > :nth-child(2) { grid-column: 2 / -1; grid-row: 1; }
    .struct-row > :nth-child(3) { grid-column: 2; grid-row: 2; }
    .struct-row > :nth-child(4) { grid-column: 3; grid-row: 2; text-align: right; }
    .struct-row > :nth-child(5),
    .struct-row > :nth-child(6),
    .struct-row > :nth-child(7) { grid-column: 2 / -1; grid-row: auto; padding-top: 2px; }
    .meta-inline { display: block; margin-left: 0; margin-top: 4px; font-size: 11px; }
    .histogram { height: 80px; }
    header .meta { font-size: 11px; }
  }
</style>
</head>
<body>
<header>
  <h1>🤖 Crésus 信号看板</h1>
  <div class="meta">
    数据：<code>signals.jsonl</code>
    · 最后更新：<span id="last-updated">—</span>
    <button id="refresh-btn" class="refresh-btn" title="手动刷新">⟳</button>
  </div>
</header>

<main>
  <div class="stats" id="stats"></div>

  <div class="panel">
    <h2>💰 P&amp;L 追踪 <span class="meta-inline" id="pnl-updated">数据加载中…</span></h2>
    <div class="panel-body">
      <div class="pnl-stats" id="pnl-stats">
        <div class="empty">等待 pnl.json 同步…</div>
      </div>
    </div>
  </div>

  <div class="panel" id="positions-panel" style="display:none">
    <h2>📈 当前持仓 <span class="meta-inline" id="positions-count"></span></h2>
    <div id="positions-table"></div>
  </div>

  <div class="panel" id="history-panel" style="display:none">
    <h2>📜 仓位历史 <span class="meta-inline" id="history-summary">—</span></h2>
    <div class="filters" style="padding: 0 20px 8px;">
      <input id="history-search" placeholder="搜索 symbol（留空看全部）..." />
    </div>
    <div id="history-table"></div>
  </div>

  <div class="panel">
    <h2>🗂 结构分布 <span class="meta-inline">A·OI 积累多 / B·资金费反转空 / C·V4A-Flash 空 / D·分布出货空 / E·强控盘 / F·财库 BTC / G·盘前套利 / H·新闻</span></h2>
    <div class="panel-body">
      <div id="structure-grid"></div>
    </div>
  </div>

  <div class="panel">
    <h2>📊 每日信号数量</h2>
    <div class="panel-body">
      <div class="histogram" id="histogram"></div>
      <div class="axis" id="axis"></div>
    </div>
  </div>

  <div class="panel">
    <h2>🎯 决策信号 <span class="meta-inline" id="decision-meta">—</span></h2>
    <div class="panel-body">
      <div id="decision-table"><div class="empty">加载中…</div></div>
    </div>
  </div>

  <div class="panel">
    <h2>📋 最近信号</h2>
    <div class="filters">
      <button data-dir="ALL" class="active">全部</button>
      <button data-dir="LONG">做多</button>
      <button data-dir="SHORT">做空</button>
      <button data-dir="WATCH">观察</button>
      <span class="filter-sep">·</span>
      <button data-mod="HIGH">≥70</button>
      <button data-mod="FOLLOW">🟢 跟</button>
      <button data-mod="ACTIVE">🎯 只看活跃</button>
      <button data-mod="FIRST">🆕 只看首发</button>
      <input id="search" placeholder="搜索 symbol..." />
    </div>
    <div id="table-wrap">
      <div class="empty">加载中…</div>
    </div>
  </div>
</main>

<script>
const DIR_CN = { LONG: "做多", SHORT: "做空", WATCH: "观察", SKIP: "跳过" };

let allSignals = [];
let analysesMap = {};
let activeDir = "ALL";
let activeMods = new Set();
let searchTerm = "";
let historyExpanded = false;

// 仓位历史 panel：symbol search + cached pnl data
let historySearchTerm = "";
let pnlSummaryCache = null;
let pnlClosesCache = [];

// ==================== P19 信号状态机 + 实时现价 ====================
let currentPrices = {};         // symbol → 现价（USDT）
let pricesLastUpdated = null;   // 最近一次成功 fetch 的 epoch ms

const SIGNAL_TTL_HOURS    = 6;    // 信号年龄 >6h → 已过期
const ENTRY_TOLERANCE_PCT = 0.5;  // 现价距 entry <0.5% → 可入场
const NEAR_SL_PCT         = 0.5;  // 现价距 SL <0.5% → 临近止损

const STATE_META = {
  WAITING: { tag: "⏳ 待触发",  color: "#8a96aa", bg: "rgba(138,150,170,0.15)" },
  ENTRY:   { tag: "✅ 可入场",  color: "#00c853", bg: "rgba(0,200,83,0.18)" },
  ACTIVE:  { tag: "🔥 已激活",  color: "#2196f3", bg: "rgba(33,150,243,0.18)" },
  NEAR_SL: { tag: "⚠️ 临近止损", color: "#ff9800", bg: "rgba(255,152,0,0.18)" },
  STOPPED: { tag: "❌ 已止损",  color: "#ff1744", bg: "rgba(255,23,68,0.18)" },
  HIT_TP:  { tag: "✅ 已止盈",  color: "#00c853", bg: "rgba(0,200,83,0.20)" },
  EXPIRED: { tag: "⏰ 已过期",  color: "#5a6478", bg: "rgba(90,100,120,0.12)" },
  WATCH:   { tag: "👀 观察",    color: "#ffd600", bg: "rgba(255,214,0,0.12)" },
  SKIP:    { tag: "—",          color: "#5a6478", bg: "transparent"          },
  NO_DATA: { tag: "— 缺数据",   color: "#5a6478", bg: "transparent"          },
  LOADING: { tag: "⏳ 加载中",   color: "#5a6478", bg: "transparent"          },
};

async function loadPrices() {
  try {
    const res = await fetch("https://fapi.binance.com/fapi/v1/ticker/price");
    if (!res.ok) return;
    const arr = await res.json();
    const map = {};
    for (const t of arr) map[t.symbol] = parseFloat(t.price);
    currentPrices = map;
    pricesLastUpdated = Date.now();
    if (allSignals.length > 0) {
      renderDecisionView();
      renderTable();
    }
  } catch (e) {
    console.warn("[prices] load failed:", e);
  }
}

// ============================ 决策视图 v2（card-based） ============================
// 把 24h 内的 LONG/SHORT 信号按 symbol 去重聚合，给卡片式决策面板

// 综合判断：单一入场建议（state + conf → verdict），取代旧的"状态+推荐"双列矛盾
function unifiedVerdict(state, conf) {
  const s = state.state;
  if (s === "NEAR_SL")
    return { label: "⚠️ 临近止损·警戒", priority: 0, color: "#ff9800", bg: "rgba(255,152,0,0.13)", border: "rgba(255,152,0,0.55)" };
  if (s === "ENTRY") {
    if (conf >= 70) return { label: "✅ 立即入场",     priority: 1, color: "#00e676", bg: "rgba(0,230,118,0.13)", border: "rgba(0,230,118,0.55)" };
    if (conf >= 60) return { label: "⚡ 可考虑入场",   priority: 2, color: "#69f0ae", bg: "rgba(105,240,174,0.10)", border: "rgba(105,240,174,0.40)" };
                    return { label: "⚠️ 低信心·谨慎", priority: 3, color: "#ffd600", bg: "rgba(255,214,0,0.10)", border: "rgba(255,214,0,0.35)" };
  }
  if (s === "ACTIVE")
    return { label: "🔥 已激活·持续关注", priority: 4, color: "#42a5f5", bg: "rgba(33,150,243,0.10)", border: "rgba(33,150,243,0.40)" };
  if (s === "WAITING") {
    if (conf >= 70) return { label: "⏳ 高信心·等待入场点", priority: 5, color: "#b0bec5", bg: "rgba(176,190,197,0.08)", border: "rgba(90,100,120,0.45)" };
                    return { label: "⏳ 等待触发",           priority: 6, color: "#5a6478", bg: "rgba(90,100,120,0.06)", border: "rgba(58,65,85,0.60)" };
  }
  if (s === "WATCH")
    return { label: "👀 观察中",  priority: 7, color: "#ffd600", bg: "rgba(255,214,0,0.08)", border: "rgba(90,100,120,0.40)" };
              return { label: "— 无状态",   priority: 8, color: "#5a6478", bg: "transparent",         border: "rgba(58,65,85,0.50)" };
}

// 行情与信号方向匹配度（结合 V3 Regime）
function regimeMatch(direction) {
  if (!regimeData) return null;
  const r = regimeData.regime;
  if (direction === "LONG") {
    if (r === "ALT_SEASON_RUNNING") return { label: "行情顺风", color: "#00c853" };
    if (r === "RISK_OFF")           return { label: "行情逆风", color: "#ff5252" };
    if (r === "BTC_DOMINATING")     return { label: "BTC主导·留意", color: "#ffd600" };
  } else if (direction === "SHORT") {
    if (r === "RISK_OFF")           return { label: "行情顺风", color: "#00c853" };
    if (r === "ALT_SEASON_RUNNING") return { label: "行情逆风", color: "#ff5252" };
  }
  return null;
}

function buildDecisionView(signals, currentPrices, nowMs) {
  const TWENTY_FOUR_H = 24 * 3600 * 1000;
  const cutoff = nowMs - TWENTY_FOUR_H;

  // 第一遍：找每个 symbol 在 24h 内的最新 LONG/SHORT 信号 + 累计 max conf + 最早 ts + 次数
  const bySymbol = new Map();
  for (const s of signals) {
    if (s.direction !== "LONG" && s.direction !== "SHORT") continue;
    const t = new Date(s.ts).getTime();
    if (t < cutoff) continue;
    const sym = s.symbol;
    let entry = bySymbol.get(sym);
    if (!entry) {
      entry = { symbol: sym, latest: s, count: 0, maxConf: 0, firstTs: s.ts };
      bySymbol.set(sym, entry);
    }
    entry.count++;
    if ((s.confidence || 0) > entry.maxConf) entry.maxConf = s.confidence || 0;
    if (new Date(s.ts).getTime() < new Date(entry.firstTs).getTime()) entry.firstTs = s.ts;
    if (new Date(s.ts).getTime() > new Date(entry.latest.ts).getTime()) entry.latest = s;
  }

  // 第二遍：对每个 symbol 计算最新信号的当前 state，过滤掉已结束 / 已过期
  const STATE_PRIO = { ENTRY: 1, ACTIVE: 2, NEAR_SL: 3, WAITING: 4, LOADING: 5, NO_DATA: 6 };
  const rows = [];
  for (const info of bySymbol.values()) {
    const state = computeSignalState(info.latest, currentPrices[info.symbol], nowMs);
    if (["EXPIRED", "STOPPED", "HIT_TP"].includes(state.state)) continue;
    rows.push({ ...info, state });
  }

  // 排序：状态优先 → 首发优先 → 信心度高优先
  rows.sort((a, b) => {
    const pa = STATE_PRIO[a.state.state] || 99;
    const pb = STATE_PRIO[b.state.state] || 99;
    if (pa !== pb) return pa - pb;
    if (a.count !== b.count) return a.count - b.count;
    return b.maxConf - a.maxConf;
  });
  return rows;
}

function renderDecisionView() {
  if (allSignals.length === 0) return;
  const nowMs = Date.now();
  const rows = buildDecisionView(allSignals, currentPrices, nowMs);

  // 重新排序：按综合判断优先级 → 信心度降序
  rows.sort((a, b) => {
    const va = unifiedVerdict(a.state, a.maxConf);
    const vb = unifiedVerdict(b.state, b.maxConf);
    if (va.priority !== vb.priority) return va.priority - vb.priority;
    return b.maxConf - a.maxConf;
  });

  const actionable = rows.filter(r => unifiedVerdict(r.state, r.maxConf).priority <= 4);
  document.getElementById("decision-meta").textContent =
    `${actionable.length} 个活跃 · ${rows.length} 个候选 · 24h 聚合`;

  if (rows.length === 0) {
    document.getElementById("decision-table").innerHTML =
      '<div class="empty">24h 内没有可入场候选（全部已结束/过期）</div>';
    return;
  }

  const cards = rows.map(r => {
    const v  = unifiedVerdict(r.state, r.maxConf);
    const rm = regimeMatch(r.latest.direction);
    const dir = r.latest.direction;
    const dirCls = dir === "LONG" ? "LONG" : "SHORT";
    const dirLabel = DIR_CN[dir] || dir;

    const confPct   = Math.min(100, r.maxConf);
    const confColor = r.maxConf >= 70 ? "#00e676" : r.maxConf >= 60 ? "#ffd600" : "#ff8a65";

    const e   = r.latest.entry_price;
    const sl  = r.latest.stop_loss;
    const tps = Array.isArray(r.latest.take_profit)
      ? r.latest.take_profit
      : (r.latest.take_profit != null ? [r.latest.take_profit] : []);

    const distBadge = (pct) => {
      if (pct == null || isNaN(pct)) return "";
      const sign = pct >= 0 ? "+" : "";
      const abs  = Math.abs(pct);
      const cls  = abs < 0.5 ? "dist-warn" : pct >= 0 ? "dist-pos" : "dist-neg";
      return `<span class="dist-pct ${cls}">${sign}${pct.toFixed(2)}%</span>`;
    };

    const levelHtml = (label, price, dist, labelColor) => {
      if (price == null || price === "") return "";
      return `<div class="d-level-row">
        <span class="d-level-label" style="color:${labelColor}">${label}</span>
        <span class="d-level-price">${formatPrice(price)}</span>
        ${distBadge(dist)}
      </div>`;
    };

    const msAgo = nowMs - new Date(r.firstTs).getTime();
    const h = Math.floor(msAgo / 3.6e6), m = Math.floor((msAgo % 3.6e6) / 60000);
    const agoStr = h > 0 ? `${h}h${m}m前` : `${m}m前`;
    const countBadge = r.count === 1
      ? `<span style="color:var(--green);font-weight:700">🆕 首发</span>`
      : `<span style="color:var(--text-dim)">🔁 ${r.count}次</span>`;

    return `<div class="d-card" style="border-color:${v.border}">
      <div class="d-card-header">
        <span class="d-symbol">${r.symbol}</span>
        <span class="badge ${dirCls}">${dirLabel}</span>
      </div>
      <div class="d-verdict" style="color:${v.color};background:${v.bg}">${v.label}</div>
      <div class="d-conf-row">
        <span class="d-conf-label">信心值</span>
        <div class="d-conf-bar-wrap"><div class="d-conf-bar" style="width:${confPct}%;background:${confColor}"></div></div>
        <span class="d-conf-num" style="color:${confColor}">${r.maxConf}</span>
      </div>
      <div class="d-levels">
        ${levelHtml("入场", e,      r.state.distEntry, "#cfd8dc")}
        ${levelHtml("止损", sl,     r.state.distSL,    "#ef9a9a")}
        ${tps[0] != null ? levelHtml("止盈", tps[0], r.state.distTP, "#a5d6a7") : ""}
      </div>
      <div class="d-card-footer">
        ${countBadge}

      </div>
    </div>`;
  }).join("");

  document.getElementById("decision-table").innerHTML = `<div class="d-grid">${cards}</div>`;
}

/**
 * 计算单条信号的当前状态。
 * @returns {{ state: string, distEntry: number|null, distSL: number|null, distTP: number|null }}
 *
 * dist% 约定：(current - target) / target * 100，带符号
 *   - 正 = 现价高于该 level
 *   - 负 = 现价低于该 level
 * 用户可结合方向自行解读；状态徽章已给出"是否触发"的客观结论。
 */
function computeSignalState(signal, currentPrice, nowMs) {
  if (signal.direction === "SKIP")
    return { state: "SKIP",  distEntry: null, distSL: null, distTP: null };
  if (signal.direction === "WATCH")
    return { state: "WATCH", distEntry: null, distSL: null, distTP: null };

  const e   = Number(signal.entry_price);
  const sl  = Number(signal.stop_loss);
  const tps = Array.isArray(signal.take_profit)
    ? signal.take_profit
    : (signal.take_profit != null ? [signal.take_profit] : []);
  const tp1 = tps.length > 0 ? Number(tps[0]) : null;

  if (!e || !sl || isNaN(e) || isNaN(sl))
    return { state: "NO_DATA", distEntry: null, distSL: null, distTP: null };

  const ageHours = (nowMs - new Date(signal.ts).getTime()) / 3.6e6;
  if (ageHours > SIGNAL_TTL_HOURS)
    return { state: "EXPIRED", distEntry: null, distSL: null, distTP: null };

  if (!currentPrice || isNaN(currentPrice))
    return { state: "LOADING", distEntry: null, distSL: null, distTP: null };

  const isLong = signal.direction === "LONG";
  const distEntry = (currentPrice - e) / e * 100;
  const distSL    = (currentPrice - sl) / sl * 100;
  const distTP    = tp1 ? (currentPrice - tp1) / tp1 * 100 : null;

  // 已触止盈（TP1）
  if (tp1) {
    if ( isLong && currentPrice >= tp1) return { state: "HIT_TP", distEntry, distSL, distTP };
    if (!isLong && currentPrice <= tp1) return { state: "HIT_TP", distEntry, distSL, distTP };
  }
  // 已触止损
  if ( isLong && currentPrice <= sl) return { state: "STOPPED", distEntry, distSL, distTP };
  if (!isLong && currentPrice >= sl) return { state: "STOPPED", distEntry, distSL, distTP };
  // 临近止损（无方向区分，<0.5% 阈值）
  if (Math.abs(distSL) < NEAR_SL_PCT) return { state: "NEAR_SL", distEntry, distSL, distTP };
  // 已激活（穿越 entry，方向一致）
  if ( isLong && currentPrice > e) return { state: "ACTIVE", distEntry, distSL, distTP };
  if (!isLong && currentPrice < e) return { state: "ACTIVE", distEntry, distSL, distTP };
  // 可入场区
  if (Math.abs(distEntry) < ENTRY_TOLERANCE_PCT) return { state: "ENTRY", distEntry, distSL, distTP };
  // 默认：还没到入场点
  return { state: "WAITING", distEntry, distSL, distTP };
}

function stateBadge(stateObj) {
  const meta = STATE_META[stateObj.state] || STATE_META.LOADING;
  return `<span class="badge" style="color:${meta.color};background:${meta.bg};white-space:nowrap;">${meta.tag}</span>`;
}

function formatDist(pct) {
  if (pct == null || isNaN(pct)) return "";
  const sign = pct >= 0 ? "+" : "";
  const abs = Math.abs(pct);
  let cls = pct >= 0 ? "dist-pos" : "dist-neg";
  if (abs < 0.5) cls = "dist-warn";   // 接近 level 时改黄色提示
  return ` <span class="dist-pct ${cls}">(${sign}${pct.toFixed(2)}%)</span>`;
}

function priceWithDist(price, distPct) {
  if (price == null || price === "") return "—";
  return formatPrice(price) + formatDist(distPct);
}

function formatTPWithDist(tp, distTP) {
  if (!tp) return "—";
  if (Array.isArray(tp)) {
    if (tp.length === 0) return "—";
    let out = formatPrice(tp[0]) + formatDist(distTP);
    if (tp.length > 1) {
      out += " / " + tp.slice(1).map(formatPrice).join(" / ");
    }
    return out;
  }
  return formatPrice(tp) + formatDist(distTP);
}

// 距现价% 简版（决策视图用，无价格数字只有百分比）
function formatDistOnly(pct) {
  if (pct == null || isNaN(pct)) return '<span style="color:var(--text-dim)">—</span>';
  const sign = pct >= 0 ? "+" : "";
  let cls = pct >= 0 ? "dist-pos" : "dist-neg";
  if (Math.abs(pct) < 0.5) cls = "dist-warn";
  return `<span class="dist-pct ${cls}" style="font-size:12px">${sign}${pct.toFixed(2)}%</span>`;
}

// P19b 信号"次序"标记：每条信号在 4h 滑动窗口内是该 symbol 第几次出现
const OCCURRENCE_WINDOW_MS = 4 * 3600 * 1000;
let occurrenceMapCache = new Map();   // ts → occurrence count

function computeOccurrenceMap(signals) {
  const sorted = [...signals].sort((a, b) => new Date(a.ts) - new Date(b.ts));
  const queues = {};   // symbol → [ts ms, ...]
  const out = new Map();
  for (const s of sorted) {
    const t = new Date(s.ts).getTime();
    const sym = s.symbol;
    if (!queues[sym]) queues[sym] = [];
    while (queues[sym].length && queues[sym][0] < t - OCCURRENCE_WINDOW_MS) {
      queues[sym].shift();
    }
    queues[sym].push(t);
    out.set(s.ts, queues[sym].length);
  }
  return out;
}

function occurrenceBadge(n) {
  if (n === 1) return '<span style="color:var(--green);font-size:10px;font-weight:600;margin-left:4px">🆕</span>';
  return `<span style="color:var(--text-dim);font-size:10px;margin-left:4px">🔁${n}</span>`;
}

async function loadAnalyses() {
  try {
    const res = await fetch("./analyses.jsonl?_=" + Date.now());
    if (!res.ok) return;
    const text = await res.text();
    const lines = text.trim().split("\n").filter(Boolean);
    const map = {};
    for (const l of lines) {
      try {
        const a = JSON.parse(l);
        if (a.ts) map[a.ts] = a;
      } catch {}
    }
    analysesMap = map;
  } catch {}
}

async function loadSignals() {
  try {
    await loadAnalyses();
    const res = await fetch("./signals.jsonl?_=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const lines = text.trim().split("\n").filter(Boolean);
    allSignals = lines.map(l => {
      try { return JSON.parse(l); } catch { return null; }
    }).filter(Boolean);

    if (allSignals.length === 0) {
      document.getElementById("table-wrap").innerHTML =
        '<div class="empty">还没有信号。等待 bot 触发第一个 ≥50 信心度的信号。</div>';
      return;
    }

    occurrenceMapCache = computeOccurrenceMap(allSignals);
    renderStats();
    renderStructures();
    renderHistogram();
    renderDecisionView();
    renderTable();
    document.getElementById("last-updated").textContent =
      new Date().toLocaleString("zh-CN", { hour12: false });
  } catch (e) {
    document.getElementById("table-wrap").innerHTML =
      `<div class="error">加载失败：${e.message}<br>请确认 <code>signals.jsonl</code> 已同步到此目录。</div>`;
  }
}

function renderStats() {
  const total = allSignals.length;
  const longs  = allSignals.filter(s => s.direction === "LONG").length;
  const shorts = allSignals.filter(s => s.direction === "SHORT").length;
  const watch  = allSignals.filter(s => s.direction === "WATCH").length;
  const high   = allSignals.filter(s => s.confidence >= 70).length;
  const avgConf = total
    ? (allSignals.reduce((a, s) => a + (s.confidence || 0), 0) / total).toFixed(1)
    : "—";

  const html = [
    { label: "总信号", value: total, cls: "" },
    { label: "做多", value: longs, cls: "long" },
    { label: "做空", value: shorts, cls: "short" },
    { label: "观察", value: watch, cls: "watch" },
    { label: "高信心 (≥70)", value: high, cls: "" },
    { label: "平均信心度", value: avgConf, cls: "" },
  ].map(s => `
    <div class="stat ${s.cls}">
      <div class="label">${s.label}</div>
      <div class="value">${s.value}</div>
    </div>
  `).join("");
  document.getElementById("stats").innerHTML = html;
}

const STRUCT_META = {
  A: { name: "OI 积累多",     color: "#00c853" },
  B: { name: "资金费反转空",  color: "#ff1744" },
  C: { name: "V4A-Flash 空",   color: "#ff5722" },
  D: { name: "分布出货空",    color: "#ff9800" },
  E: { name: "强控盘回避",    color: "#9e9e9e" },
  F: { name: "财库 BTC 多",    color: "#ffd600" },
  G: { name: "盘前套利",       color: "#9e9e9e" },
  H: { name: "新闻事件",       color: "#2196f3" },
  none: { name: "无结构",     color: "#5a6478" },
};

function renderStructures() {
  const buckets = {};
  for (const s of allSignals) {
    const k = (s.structure || "none").toUpperCase();
    const key = STRUCT_META[k] ? k : "none";
    if (!buckets[key]) buckets[key] = { count: 0, conf_sum: 0, LONG: 0, SHORT: 0, WATCH: 0, SKIP: 0 };
    const b = buckets[key];
    b.count++;
    b.conf_sum += (s.confidence || 0);
    if (s.direction in b) b[s.direction]++;
  }

  const total = allSignals.length || 1;
  const order = ["A", "B", "C", "D", "E", "F", "G", "H", "none"];
  const max = Math.max(...order.map(k => buckets[k]?.count || 0), 1);

  const html = order
    .filter(k => buckets[k] && buckets[k].count > 0)
    .map(k => {
      const b = buckets[k];
      const meta = STRUCT_META[k];
      const pct = (b.count / total * 100).toFixed(1);
      const avg = (b.conf_sum / b.count).toFixed(0);
      const widthPct = (b.count / max * 100).toFixed(1);
      const parts = [];
      if (b.LONG)  parts.push(`<span style="color:var(--green)">多 ${b.LONG}</span>`);
      if (b.SHORT) parts.push(`<span style="color:var(--red)">空 ${b.SHORT}</span>`);
      if (b.WATCH) parts.push(`<span style="color:var(--yellow)">观 ${b.WATCH}</span>`);
      if (b.SKIP)  parts.push(`<span style="color:var(--text-dim)">跳 ${b.SKIP}</span>`);
      return `
        <div class="struct-row">
          <span class="struct-letter" style="background:${meta.color}">${k === 'none' ? '?' : k}</span>
          <span style="color:var(--text-dim);font-size:12px">${meta.name}</span>
          <div class="struct-bar-wrap"><div class="struct-bar" style="width:${widthPct}%;background:${meta.color}"></div></div>
          <span class="struct-count">${b.count}</span>
          <span class="struct-pct">${pct}%</span>
          <span class="struct-dir">${parts.join(" · ")}</span>
          <span class="struct-conf">avg ${avg}</span>
        </div>
      `;
    }).join("");

  document.getElementById("structure-grid").innerHTML = html || '<div class="empty">还没有信号</div>';
}

function renderHistogram() {
  const buckets = {};
  for (const s of allSignals) {
    const day = (s.ts || "").slice(0, 10);
    if (!day) continue;
    buckets[day] = (buckets[day] || 0) + 1;
  }
  const days = Object.keys(buckets).sort().slice(-30);
  if (days.length === 0) return;
  const max = Math.max(...days.map(d => buckets[d]));

  const bars = days.map(d => {
    const h = (buckets[d] / max * 100).toFixed(1);
    return `<div class="bar" style="height:${h}%" data-tip="${d} · ${buckets[d]} 条"></div>`;
  }).join("");
  document.getElementById("histogram").innerHTML = bars;

  const stride = Math.ceil(days.length / 6);
  const labels = days.map((d, i) =>
    `<span>${i % stride === 0 ? d.slice(5) : ""}</span>`
  ).join("");
  document.getElementById("axis").innerHTML = labels;
}

function renderTable() {
  let rows = allSignals.slice().reverse();

  if (activeDir === "LONG")    rows = rows.filter(s => s.direction === "LONG");
  if (activeDir === "SHORT")   rows = rows.filter(s => s.direction === "SHORT");
  if (activeDir === "WATCH")   rows = rows.filter(s => s.direction === "WATCH");
  if (activeMods.has("HIGH"))   rows = rows.filter(s => (s.confidence || 0) >= 70);
  if (activeMods.has("FOLLOW")) rows = rows.filter(s => (analysesMap[s.ts] || {}).recommendation === "跟");
  if (searchTerm) {
    const q = searchTerm.toUpperCase();
    rows = rows.filter(s => (s.symbol || "").toUpperCase().includes(q));
  }

  // 预先计算每行 state（FOLLOW/ACTIVE 过滤都要用）+ occurrence
  const nowMs = Date.now();
  const rowsWithState = rows.map(s => ({
    s,
    a: analysesMap[s.ts] || {},
    state: computeSignalState(s, currentPrices[s.symbol], nowMs),
    occN: occurrenceMapCache.get(s.ts) || 1,

  // "🎯 只看活跃"：仅保留可入场 / 已激活 / 临近止损 三种"现在该看一眼"的状态

  const html = `

      <thead>
        <tr>
          <th>时间</th>
          <th>Symbol</th>

          <th>推荐</th>
          <th>风险</th>
          <th>结构匹配</th>
          <th>杠杆</th>
          <th>入场</th>
          <th>止损</th>
          <th>止盈</th>
          <th>结构</th>
          <th>路由</th>
        </tr>
      </thead>
      <tbody>
        ${filtered.map(({ s, a, state, occN }) => `
          <tr>
            <td>${formatTime(s.ts)}</td>
            <td><strong>${s.symbol || "—"}</strong>${occurrenceBadge(occN)}</td>
            <td><span class="badge ${s.direction}">${DIR_CN[s.direction] || s.direction}</span></td>
            <td><span class="conf">${s.confidence || "—"}</span></td>
            <td>${stateBadge(state)}</td>
            <td>${recBadge(a.recommendation)}</td>
            <td>${riskBadge(a.risk_level)}</td>
            <td>${matchBadge(a.structure_match)}</td>
            <td>${s.leverage ? s.leverage + "×" : "—"}</td>
            <td>${priceWithDist(s.entry_price, state.distEntry)}</td>
            <td>${priceWithDist(s.stop_loss, state.distSL)}</td>
            <td>${formatTPWithDist(s.take_profit, state.distTP)}</td>
            <td>${s.structure || a.structure_judge || "—"}</td>
            <td>${s.routed_to || "—"}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
  document.getElementById("table-wrap").innerHTML = html;
}

function formatTime(ts) {
  if (!ts) return "—";
  const d = new Date(ts);
  return d.toLocaleString("zh-CN", { hour12: false, month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
}
function recBadge(rec) {
  if (!rec) return "—";
  const map = { "跟": ["#00c853", "rgba(0,200,83,0.15)"], "观察": ["#ffd600", "rgba(255,214,0,0.15)"], "不跟": ["#ff1744", "rgba(255,23,68,0.15)"] };
  const [c, bg] = map[rec] || ["#8a96aa", "rgba(138,150,170,0.15)"];
  return `<span class="badge" style="color:${c};background:${bg};">${rec}</span>`;
}
function riskBadge(r) {
  if (!r) return "—";
  const map = { "低": ["#00c853", "rgba(0,200,83,0.15)"], "中": ["#ffd600", "rgba(255,214,0,0.15)"], "高": ["#ff1744", "rgba(255,23,68,0.15)"] };
  const [c, bg] = map[r] || ["#8a96aa", "rgba(138,150,170,0.15)"];
  return `<span class="badge" style="color:${c};background:${bg};">${r}</span>`;
}
function matchBadge(m) {
  if (!m) return "—";
  const map = { "高": "#00c853", "中": "#ffd600", "低": "#ff1744" };
  return `<span style="color:${map[m] || '#8a96aa'};font-weight:600;">${m}</span>`;
}
function formatPrice(p) {
  if (p == null || p === "") return "—";
  const n = Number(p);
  if (isNaN(n)) return p;
  if (n < 1) return n.toPrecision(4);
  if (n < 100) return n.toFixed(4);
  return n.toFixed(2);
}
function formatTP(tp) {
  if (!tp) return "—";
  if (Array.isArray(tp)) return tp.map(formatPrice).join(" / ");
  return formatPrice(tp);
}

document.querySelectorAll(".filters button[data-dir]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filters button[data-dir]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeDir = btn.dataset.dir;
    renderTable();
  });
});
document.querySelectorAll(".filters button[data-mod]").forEach(btn => {
  btn.addEventListener("click", () => {
    const mod = btn.dataset.mod;
    if (activeMods.has(mod)) {
      activeMods.delete(mod);
      btn.classList.remove("active");
    } else {
      activeMods.add(mod);
      btn.classList.add("active");
    }
    renderTable();
  });
});
document.getElementById("search").addEventListener("input", e => {
  searchTerm = e.target.value;
  renderTable();
});

async function loadPnL() {
  try {
    const res = await fetch("./pnl.json?_=" + Date.now());
    if (!res.ok) {
      document.getElementById("pnl-updated").textContent = "未配置（pnl.json 不存在）";
      return;
    }
    const data = await res.json();
    pnlSummaryCache = data.summary || null;
    pnlClosesCache = data.closed_recent || [];
    renderPnLStats(data.summary, data.updated_at, pnlClosesCache);
    renderPositions(data.positions || []);
    renderHistory(data.summary, pnlClosesCache);
  } catch (e) {
    document.getElementById("pnl-updated").textContent = "加载失败：" + e.message;
  }
}

function renderPnLStats(s, updatedAt, closes) {
  if (!s) return;
  const updated = updatedAt ? new Date(updatedAt).toLocaleString("zh-CN", { hour12: false }) : "—";
  document.getElementById("pnl-updated").textContent = "更新于 " + updated;

  const upl = s.total_unrealized_pnl || 0;
  const today = s.today_realized_pnl || 0;
  const total = s.total_realized_pnl || 0;
  const winRate = (s.win_rate || 0) * 100;

  // 累计胜率：优先用后端 all_time_* 字段（fetch_pnl.py 写入 closes_all.jsonl 持久化），
  // 后端未升级时回退到从 closed_recent 现算（受 OKX bills API 时间窗限制，可能不全）
  let allWins, allLosses, allClosed, allWinRate;
  if (s.all_time_closed != null) {
    allWins   = s.all_time_wins   || 0;
    allLosses = s.all_time_losses || 0;
    allClosed = s.all_time_closed || 0;
    allWinRate = (s.all_time_win_rate || 0) * 100;
  } else {
    allWins = 0; allLosses = 0;
    for (const c of (closes || [])) {
      if ((c.net || 0) > 0) allWins++;
      else if ((c.net || 0) < 0) allLosses++;
    }
    allClosed = allWins + allLosses;
    allWinRate = allClosed > 0 ? (allWins / allClosed * 100) : 0;
  }

  const cards = [
    {
      label: "当前持仓",
      value: s.open_positions || 0,
      sub: s.open_positions > 0 ? "笔" : "",
    },
    {
      label: "浮动盈亏",
      value: formatPnl(upl),
      cls: pnlClass(upl),
      sub: "未实现",
    },
    {
      label: "24h 已实现",
      value: formatPnl(today),
      cls: pnlClass(today),
      sub: `${s.today_closed || 0} 笔平仓`,
    },
    {
      label: "24h 胜率",
      value: s.today_closed ? winRate.toFixed(0) + "%" : "—",
      sub: s.today_closed ? `${s.today_wins}胜 / ${s.today_losses}负` : "",
    },
    {
      label: "累计胜率",
      value: allClosed > 0 ? allWinRate.toFixed(0) + "%" : "—",
      sub: allClosed > 0 ? `${allWins}胜 / ${allLosses}负 · ${allClosed}笔` : "",
    },
    {
      label: "累计已实现",
      value: formatPnl(total),
      cls: pnlClass(total),
      sub: "USDT",
    },
  ];

  document.getElementById("pnl-stats").innerHTML = cards.map(c => `
    <div class="pnl-card">
      <div class="label">${c.label}</div>
      <div class="value ${c.cls || ""}">${c.value}</div>
      ${c.sub ? `<div class="sub">${c.sub}</div>` : ""}
    </div>
  `).join("");
}

function renderPositions(positions) {
  const panel = document.getElementById("positions-panel");
  if (!positions.length) { panel.style.display = "none"; return; }
  panel.style.display = "";
  document.getElementById("positions-count").textContent = `${positions.length} 笔`;

  const html = `
    <table>
      <thead>
        <tr>
          <th>合约</th>
          <th>方向</th>
          <th>数量</th>
          <th>开仓价</th>
          <th>标记价</th>
          <th>浮盈</th>
          <th>盈亏率</th>
          <th>杠杆</th>
        </tr>
      </thead>
      <tbody>
        ${positions.map(p => {
          const isLong = p.side === 'long' || (p.side === 'net' && p.size > 0);
          const isShort = p.side === 'short' || (p.side === 'net' && p.size < 0);
          const dirCn = isLong ? '做多' : (isShort ? '做空' : '—');
          const dirCls = isLong ? 'LONG' : (isShort ? 'SHORT' : '');
          return `
          <tr>
            <td><strong>${p.symbol}</strong></td>
            <td><span class="badge ${dirCls}">${dirCn}</span></td>
            <td>${Math.abs(p.size)}</td>
            <td>${formatPrice(p.entry)}</td>
            <td>${formatPrice(p.mark)}</td>
            <td class="pnl-cell ${pnlClass(p.upl)}">${formatPnl(p.upl)}</td>
            <td class="pnl-cell ${pnlClass(p.upl_ratio)}">${(p.upl_ratio * 100).toFixed(2)}%</td>
            <td>${p.lever}×</td>
          </tr>
        `;}).join("")}
      </tbody>
    </table>
  `;
  document.getElementById("positions-table").innerHTML = html;
}

function renderHistory(summary, closes) {
  const panel = document.getElementById("history-panel");
  if (!closes.length && !(summary?.today_opened)) { panel.style.display = "none"; return; }
  panel.style.display = "";

  const opened   = summary?.today_opened || 0;
  const closed   = summary?.today_closed || 0;
  const liq      = summary?.today_liquidated || 0;
  const realized = summary?.today_realized_pnl || 0;
  const fees     = summary?.today_fees || 0;
  const net      = realized + fees;
  const sumLine =
    `过去 24h: <strong>${opened}</strong> 开 · <strong>${closed}</strong> 平` +
    (liq > 0 ? ` · <span class="pnl-negative"><strong>${liq}</strong> 爆仓</span>` : "") +
    ` · 已实现 <span class="${pnlClass(realized)}">${formatPnl(realized)}</span>` +
    ` · 手续费 <span style="color:var(--text-dim)">${fees.toFixed(2)}</span>` +
    ` · 净 <span class="${pnlClass(net)}" style="font-weight:700">${formatPnl(net)} USDT</span>`;
  document.getElementById("history-summary").innerHTML = sumLine;

  if (!closes.length) {
    document.getElementById("history-table").innerHTML = '<div class="empty">还没有平仓记录</div>';
    return;
  }

  // symbol 过滤（搜索 active 时跳过 collapse 限制，看全部匹配）
  let filtered = closes;
  if (historySearchTerm) {
    const q = historySearchTerm.toUpperCase();
    filtered = filtered.filter(c => (c.symbol || "").toUpperCase().includes(q));
  }
  const isFiltering = historySearchTerm.length > 0;

  if (isFiltering && !filtered.length) {
    document.getElementById("history-table").innerHTML =
      `<div class="empty">没有匹配 "${historySearchTerm}" 的平仓记录</div>`;
    return;
  }

  const COLLAPSED_LIMIT = 10;
  const visibleCloses = (historyExpanded || isFiltering) ? filtered : filtered.slice(0, COLLAPSED_LIMIT);
  const hasMore = !isFiltering && filtered.length > COLLAPSED_LIMIT;

  const recap = visibleCloses.reduce((a, c) => {
    a.wins   += c.net > 0 ? 1 : 0;
    a.losses += c.net < 0 ? 1 : 0;
    a.netSum += (c.net || 0);
    if (c.open_ts && c.ts) {
      const ms = new Date(c.ts).getTime() - new Date(c.open_ts).getTime();
      if (ms > 0) { a.durSum += ms; a.durCount += 1; }
    }
    return a;
  }, {wins:0, losses:0, netSum:0, durSum:0, durCount:0});
  const avgDurMs = recap.durCount ? Math.floor(recap.durSum / recap.durCount) : 0;
  const avgDurMin = Math.floor(avgDurMs / 60000);
  const avgDurStr = avgDurMin < 60 ? `${avgDurMin}m` : `${Math.floor(avgDurMin/60)}h${avgDurMin%60}m`;
  const recapNetCls = recap.netSum > 0 ? "pnl-positive" : (recap.netSum < 0 ? "pnl-negative" : "");

  const html = `
    <table>
      <thead>
        <tr>
          <th>时间</th>
          <th>Symbol</th>
          <th>方向</th>
          <th>持仓</th>
          <th>入场</th>
          <th>出场</th>
          <th>盈亏</th>
          <th>手续费</th>
          <th>净</th>
          <th>类型</th>
        </tr>
      </thead>
      <tbody>
        ${visibleCloses.map(c => {
          const dirCn = c.side === 'long' ? '平多' : '平空';
          const dirCls = c.side === 'long' ? 'LONG' : 'SHORT';
          const tag = c.liquidated
            ? '<span class="badge" style="color:var(--red);background:rgba(255,23,68,0.15)">爆仓</span>'
            : '<span style="color:var(--text-dim);font-size:11px">正常</span>';
          const outsideClass = isWithin24h(c.ts) ? "" : " class=\"outside-24h\"";
          return `
          <tr${outsideClass}>
            <td>${formatTime(c.ts)}</td>
            <td><strong>${c.symbol}</strong></td>
            <td><span class="badge ${dirCls}">${dirCn}</span></td>
            <td style="color:var(--text-dim)">${formatDuration(c.open_ts, c.ts)}</td>
            <td>${formatPrice(c.open_px)}</td>
            <td>${formatPrice(c.close_px)}</td>
            <td class="pnl-cell ${pnlClass(c.pnl)}">${formatPnl(c.pnl)}</td>
            <td style="color:var(--text-dim)">${(c.fee || 0).toFixed(4)}</td>
            <td class="pnl-cell ${pnlClass(c.net)}">${formatPnl(c.net)}</td>
            <td>${tag}</td>
          </tr>
        `;}).join("")}
      </tbody>
    </table>
    <div class="history-recap">
      当前列表 <strong>${visibleCloses.length}</strong> 笔: 
      <strong style="color:var(--green)">${recap.wins}</strong> 胜 / 
      <strong style="color:var(--red)">${recap.losses}</strong> 负 · 
      净 <strong class="${recapNetCls}">${formatPnl(recap.netSum)} USDT</strong>
      ${recap.durCount ? ` · 平均持仓 <strong>${avgDurStr}</strong>` : ""}
    </div>
    ${hasMore ? `
      <div class="history-toggle" id="history-toggle">
        ${historyExpanded
          ? `▲ 收起（仅显示最近 ${COLLAPSED_LIMIT} 笔）`
          : `▼ 展开全部 ${closes.length} 笔（24h 之前的行已变暗）`}
      </div>
    ` : ""}
  `;
  document.getElementById("history-table").innerHTML = html;

  const toggleBtn = document.getElementById("history-toggle");
  if (toggleBtn) {
    toggleBtn.addEventListener("click", () => {
      historyExpanded = !historyExpanded;
      renderHistory(summary, closes);
    });
  }
}

function isWithin24h(iso) {
  if (!iso) return false;
  const t = new Date(iso).getTime();
  return (Date.now() - t) < 86400000;
}

function formatDuration(openIso, closeIso) {
  if (!openIso || !closeIso) return "—";
  const ms = new Date(closeIso).getTime() - new Date(openIso).getTime();
  if (ms < 0) return "—";
  const m = Math.floor(ms / 60000);
  if (m < 60) return `${m}m`;
  const h = Math.floor(m / 60);
  const mm = m % 60;
  if (h < 24) return mm > 0 ? `${h}h${mm}m` : `${h}h`;
  const d = Math.floor(h / 24);
  const hh = h % 24;
  return hh > 0 ? `${d}d${hh}h` : `${d}d`;
}

function formatPnl(v) {
  if (v == null || isNaN(v)) return "—";
  const n = Number(v);
  const sign = n > 0 ? "+" : "";
  return sign + n.toFixed(2);
}

function pnlClass(v) {
  const n = Number(v);
  if (isNaN(n) || n === 0) return "";
  return n > 0 ? "pnl-positive" : "pnl-negative";
}

async function manualRefresh() {
  const btn = document.getElementById("refresh-btn");
  btn.classList.add("spinning");
  try {
    await Promise.all([loadSignals(), loadPnL(), loadPrices()]);
  } finally {
    setTimeout(() => btn.classList.remove("spinning"), 300);
  }
}

document.getElementById("refresh-btn").addEventListener("click", manualRefresh);

// 仓位历史 symbol 搜索：input 在 panel 里常驻，只更新 #history-table 内容
document.getElementById("history-search").addEventListener("input", e => {
  historySearchTerm = e.target.value;
  if (pnlClosesCache.length || pnlSummaryCache) {
    renderHistory(pnlSummaryCache, pnlClosesCache);
  }
});

loadSignals();
loadPnL();
loadPrices();
setInterval(loadSignals, 60_000);
setInterval(loadPnL, 60_000);
setInterval(loadPrices, 60_000);
</script>
