<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Crésus 信号看板</title>
<style>
  :root {
    --bg: #0b0f17;
    --panel: #131a26;
    --panel-2: #1a2332;
    --border: #243047;
    --text: #e6edf6;
    --text-dim: #8a96aa;
    --green: #00c853;
    --red: #ff1744;
    --yellow: #ffd600;
    --blue: #2196f3;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 { margin: 0; font-size: 22px; font-weight: 600; }
  header .meta { color: var(--text-dim); font-size: 13px; }
  main { padding: 24px 32px 64px; max-width: 1280px; margin: 0 auto; }

  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }
  .stat {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
  }
  .stat .label { color: var(--text-dim); font-size: 12px; margin-bottom: 6px; }
  .stat .value { font-size: 24px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .stat.long  .value { color: var(--green); }
  .stat.short .value { color: var(--red); }
  .stat.watch .value { color: var(--yellow); }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .panel h2 {
    margin: 0;
    padding: 16px 20px;
    font-size: 15px;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    background: var(--panel-2);
  }
  .panel-body { padding: 16px 20px; }

  /* histogram */
  .histogram {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 120px;
    padding: 8px 0;
  }
  .bar {
    flex: 1;
    background: var(--blue);
    border-radius: 3px 3px 0 0;
    min-height: 2px;
    position: relative;
    cursor: default;
  }
  .bar:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: #000;
    color: #fff;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 11px;
    white-space: nowrap;
    margin-bottom: 4px;
  }
  .axis {
    display: flex;
    gap: 4px;
    margin-top: 6px;
    color: var(--text-dim);
    font-size: 10px;
  }
  .axis span { flex: 1; text-align: center; overflow: hidden; }

  /* table */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td {
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }
  th {
    background: var(--panel-2);
    color: var(--text-dim);
    font-weight: 500;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    position: sticky;
    top: 0;
  }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge.LONG  { background: rgba(0,200,83,0.15);  color: var(--green); }
  .badge.SHORT { background: rgba(255,23,68,0.15); color: var(--red); }
  .badge.WATCH { background: rgba(255,214,0,0.15); color: var(--yellow); }

  .conf {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(33,150,243,0.15);
    color: var(--blue);
    font-weight: 600;
  }

  .filters { display: flex; gap: 8px; padding: 12px 20px; background: var(--panel-2); border-bottom: 1px solid var(--border); }
  .filters button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }
  .filters button.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .filters input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    margin-left: auto;
    min-width: 160px;
  }

  .empty, .error { padding: 40px; text-align: center; color: var(--text-dim); }
  .error { color: var(--red); }
  code { background: var(--panel-2); padding: 2px 6px; border-radius: 4px; font-size: 12px; }

  .pnl-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }
  .pnl-card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .pnl-card .label { color: var(--text-dim); font-size: 12px; margin-bottom: 6px; }
  .pnl-card .value {
    font-size: 22px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .pnl-card .sub { color: var(--text-dim); font-size: 11px; margin-top: 4px; }
  .pnl-positive { color: var(--green); }
  .pnl-negative { color: var(--red); }

  .meta-inline { font-size: 12px; color: var(--text-dim); font-weight: normal; margin-left: 8px; }

  .pnl-cell { font-variant-numeric: tabular-nums; font-weight: 600; }
</style>
</head>
<body>
<header>
  <h1>🤖 Crésus 信号看板</h1>
  <div class="meta">
    数据：<code>signals.jsonl</code>
    · 最后更新：<span id="last-updated">—</span>
  </div>
</header>

<main>
  <div class="stats" id="stats"></div>

  <div class="panel">
    <h2>💰 P&amp;L 追踪 <span class="meta-inline" id="pnl-updated">数据加载中…</span></h2>
    <div class="panel-body">
      <div class="pnl-stats" id="pnl-stats">
        <div class="empty">等待 pnl.json 同步…</div>
      </div>
    </div>
  </div>

  <div class="panel" id="positions-panel" style="display:none">
    <h2>📈 当前持仓 <span class="meta-inline" id="positions-count"></span></h2>
    <div id="positions-table"></div>
  </div>

  <div class="panel" id="closed-panel" style="display:none">
    <h2>🔒 最近平仓 <span class="meta-inline" id="closed-count"></span></h2>
    <div id="closed-table"></div>
  </div>

  <div class="panel">
    <h2>📊 每日信号数量</h2>
    <div class="panel-body">
      <div class="histogram" id="histogram"></div>
      <div class="axis" id="axis"></div>
    </div>
  </div>

  <div class="panel">
    <h2>📋 最近信号</h2>
    <div class="filters">
      <button data-filter="ALL" class="active">全部</button>
      <button data-filter="LONG">做多</button>
      <button data-filter="SHORT">做空</button>
      <button data-filter="WATCH">观察</button>
      <button data-filter="HIGH">≥70</button>
      <input id="search" placeholder="搜索 symbol..." />
    </div>
    <div id="table-wrap">
      <div class="empty">加载中…</div>
    </div>
  </div>
</main>

<script>
const DIR_CN = { LONG: "做多", SHORT: "做空", WATCH: "观察", SKIP: "跳过" };

let allSignals = [];
let analysesMap = {};
let activeFilter = "ALL";
let searchTerm = "";

async function loadAnalyses() {
  try {
    const res = await fetch("./analyses.jsonl?_=" + Date.now());
    if (!res.ok) return;
    const text = await res.text();
    const lines = text.trim().split("\n").filter(Boolean);
    const map = {};
    for (const l of lines) {
      try {
        const a = JSON.parse(l);
        if (a.ts) map[a.ts] = a;
      } catch {}
    }
    analysesMap = map;
  } catch {}
}

async function loadSignals() {
  try {
    await loadAnalyses();
    const res = await fetch("./signals.jsonl?_=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const lines = text.trim().split("\n").filter(Boolean);
    allSignals = lines.map(l => {
      try { return JSON.parse(l); } catch { return null; }
    }).filter(Boolean);

    if (allSignals.length === 0) {
      document.getElementById("table-wrap").innerHTML =
        '<div class="empty">还没有信号。等待 bot 触发第一个 ≥50 信心度的信号。</div>';
      return;
    }

    renderStats();
    renderHistogram();
    renderTable();
    document.getElementById("last-updated").textContent =
      new Date().toLocaleString("zh-CN", { hour12: false });
  } catch (e) {
    document.getElementById("table-wrap").innerHTML =
      `<div class="error">加载失败：${e.message}<br>请确认 <code>signals.jsonl</code> 已同步到此目录。</div>`;
  }
}

function renderStats() {
  const total = allSignals.length;
  const longs  = allSignals.filter(s => s.direction === "LONG").length;
  const shorts = allSignals.filter(s => s.direction === "SHORT").length;
  const watch  = allSignals.filter(s => s.direction === "WATCH").length;
  const high   = allSignals.filter(s => s.confidence >= 70).length;
  const avgConf = total
    ? (allSignals.reduce((a, s) => a + (s.confidence || 0), 0) / total).toFixed(1)
    : "—";

  const html = [
    { label: "总信号", value: total, cls: "" },
    { label: "做多", value: longs, cls: "long" },
    { label: "做空", value: shorts, cls: "short" },
    { label: "观察", value: watch, cls: "watch" },
    { label: "高信心 (≥70)", value: high, cls: "" },
    { label: "平均信心度", value: avgConf, cls: "" },
  ].map(s => `
    <div class="stat ${s.cls}">
      <div class="label">${s.label}</div>
      <div class="value">${s.value}</div>
    </div>
  `).join("");
  document.getElementById("stats").innerHTML = html;
}

function renderHistogram() {
  const buckets = {};
  for (const s of allSignals) {
    const day = (s.ts || "").slice(0, 10);
    if (!day) continue;
    buckets[day] = (buckets[day] || 0) + 1;
  }
  const days = Object.keys(buckets).sort().slice(-30);
  if (days.length === 0) return;
  const max = Math.max(...days.map(d => buckets[d]));

  const bars = days.map(d => {
    const h = (buckets[d] / max * 100).toFixed(1);
    return `<div class="bar" style="height:${h}%" data-tip="${d} · ${buckets[d]} 条"></div>`;
  }).join("");
  document.getElementById("histogram").innerHTML = bars;

  const stride = Math.ceil(days.length / 6);
  const labels = days.map((d, i) =>
    `<span>${i % stride === 0 ? d.slice(5) : ""}</span>`
  ).join("");
  document.getElementById("axis").innerHTML = labels;
}

function renderTable() {
  let rows = allSignals.slice().reverse();

  if (activeFilter === "LONG")  rows = rows.filter(s => s.direction === "LONG");
  if (activeFilter === "SHORT") rows = rows.filter(s => s.direction === "SHORT");
  if (activeFilter === "WATCH") rows = rows.filter(s => s.direction === "WATCH");
  if (activeFilter === "HIGH")  rows = rows.filter(s => (s.confidence || 0) >= 70);
  if (searchTerm) {
    const q = searchTerm.toUpperCase();
    rows = rows.filter(s => (s.symbol || "").toUpperCase().includes(q));
  }

  rows = rows.slice(0, 200);

  if (rows.length === 0) {
    document.getElementById("table-wrap").innerHTML =
      '<div class="empty">没有匹配的信号</div>';
    return;
  }

  const html = `
    <table>
      <thead>
        <tr>
          <th>时间</th>
          <th>Symbol</th>
          <th>方向</th>
          <th>信心度</th>
          <th>推荐</th>
          <th>风险</th>
          <th>结构匹配</th>
          <th>杠杆</th>
          <th>入场</th>
          <th>止损</th>
          <th>止盈</th>
          <th>结构</th>
          <th>路由</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(s => {
          const a = analysesMap[s.ts] || {};
          return `
          <tr>
            <td>${formatTime(s.ts)}</td>
            <td><strong>${s.symbol || "—"}</strong></td>
            <td><span class="badge ${s.direction}">${DIR_CN[s.direction] || s.direction}</span></td>
            <td><span class="conf">${s.confidence || "—"}</span></td>
            <td>${recBadge(a.recommendation)}</td>
            <td>${riskBadge(a.risk_level)}</td>
            <td>${matchBadge(a.structure_match)}</td>
            <td>${s.leverage ? s.leverage + "×" : "—"}</td>
            <td>${formatPrice(s.entry_price)}</td>
            <td>${formatPrice(s.stop_loss)}</td>
            <td>${formatTP(s.take_profit)}</td>
            <td>${s.structure || a.structure_judge || "—"}</td>
            <td>${s.routed_to || "—"}</td>
          </tr>
        `;}).join("")}
      </tbody>
    </table>
  `;
  document.getElementById("table-wrap").innerHTML = html;
}

function formatTime(ts) {
  if (!ts) return "—";
  const d = new Date(ts);
  return d.toLocaleString("zh-CN", { hour12: false, month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
}
function recBadge(rec) {
  if (!rec) return "—";
  const map = { "跟": ["#00c853", "rgba(0,200,83,0.15)"], "观察": ["#ffd600", "rgba(255,214,0,0.15)"], "不跟": ["#ff1744", "rgba(255,23,68,0.15)"] };
  const [c, bg] = map[rec] || ["#8a96aa", "rgba(138,150,170,0.15)"];
  return `<span class="badge" style="color:${c};background:${bg};">${rec}</span>`;
}
function riskBadge(r) {
  if (!r) return "—";
  const map = { "低": ["#00c853", "rgba(0,200,83,0.15)"], "中": ["#ffd600", "rgba(255,214,0,0.15)"], "高": ["#ff1744", "rgba(255,23,68,0.15)"] };
  const [c, bg] = map[r] || ["#8a96aa", "rgba(138,150,170,0.15)"];
  return `<span class="badge" style="color:${c};background:${bg};">${r}</span>`;
}
function matchBadge(m) {
  if (!m) return "—";
  const map = { "高": "#00c853", "中": "#ffd600", "低": "#ff1744" };
  return `<span style="color:${map[m] || '#8a96aa'};font-weight:600;">${m}</span>`;
}
function formatPrice(p) {
  if (p == null || p === "") return "—";
  const n = Number(p);
  if (isNaN(n)) return p;
  if (n < 1) return n.toPrecision(4);
  if (n < 100) return n.toFixed(4);
  return n.toFixed(2);
}
function formatTP(tp) {
  if (!tp) return "—";
  if (Array.isArray(tp)) return tp.map(formatPrice).join(" / ");
  return formatPrice(tp);
}

document.querySelectorAll(".filters button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    renderTable();
  });
});
document.getElementById("search").addEventListener("input", e => {
  searchTerm = e.target.value;
  renderTable();
});

async function loadPnL() {
  try {
    const res = await fetch("./pnl.json?_=" + Date.now());
    if (!res.ok) {
      document.getElementById("pnl-updated").textContent = "未配置（pnl.json 不存在）";
      return;
    }
    const data = await res.json();
    renderPnLStats(data.summary, data.updated_at);
    renderPositions(data.positions || []);
    renderClosed(data.closed_recent || []);
  } catch (e) {
    document.getElementById("pnl-updated").textContent = "加载失败：" + e.message;
  }
}

function renderPnLStats(s, updatedAt) {
  if (!s) return;
  const updated = updatedAt ? new Date(updatedAt).toLocaleString("zh-CN", { hour12: false }) : "—";
  document.getElementById("pnl-updated").textContent = "更新于 " + updated;

  const upl = s.total_unrealized_pnl || 0;
  const today = s.today_realized_pnl || 0;
  const total = s.total_realized_pnl || 0;
  const winRate = (s.win_rate || 0) * 100;

  const cards = [
    {
      label: "当前持仓",
      value: s.open_positions || 0,
      sub: s.open_positions > 0 ? "笔" : "",
    },
    {
      label: "浮动盈亏",
      value: formatPnl(upl),
      cls: pnlClass(upl),
      sub: "未实现",
    },
    {
      label: "今日已实现",
      value: formatPnl(today),
      cls: pnlClass(today),
      sub: `${s.today_closed || 0} 笔平仓`,
    },
    {
      label: "今日胜率",
      value: s.today_closed ? winRate.toFixed(0) + "%" : "—",
      sub: s.today_closed ? `${s.today_wins}胜 / ${s.today_losses}负` : "",
    },
    {
      label: "累计已实现",
      value: formatPnl(total),
      cls: pnlClass(total),
      sub: "USDT",
    },
  ];

  document.getElementById("pnl-stats").innerHTML = cards.map(c => `
    <div class="pnl-card">
      <div class="label">${c.label}</div>
      <div class="value ${c.cls || ""}">${c.value}</div>
      ${c.sub ? `<div class="sub">${c.sub}</div>` : ""}
    </div>
  `).join("");
}

function renderPositions(positions) {
  const panel = document.getElementById("positions-panel");
  if (!positions.length) { panel.style.display = "none"; return; }
  panel.style.display = "";
  document.getElementById("positions-count").textContent = `${positions.length} 笔`;

  const html = `
    <table>
      <thead>
        <tr>
          <th>合约</th>
          <th>方向</th>
          <th>数量</th>
          <th>开仓价</th>
          <th>标记价</th>
          <th>浮盈</th>
          <th>盈亏率</th>
          <th>杠杆</th>
        </tr>
      </thead>
      <tbody>
        ${positions.map(p => {
          const isLong = p.side === 'long' || (p.side === 'net' && p.size > 0);
          const isShort = p.side === 'short' || (p.side === 'net' && p.size < 0);
          const dirCn = isLong ? '做多' : (isShort ? '做空' : '—');
          const dirCls = isLong ? 'LONG' : (isShort ? 'SHORT' : '');
          return `
          <tr>
            <td><strong>${p.symbol}</strong></td>
            <td><span class="badge ${dirCls}">${dirCn}</span></td>
            <td>${Math.abs(p.size)}</td>
            <td>${formatPrice(p.entry)}</td>
            <td>${formatPrice(p.mark)}</td>
            <td class="pnl-cell ${pnlClass(p.upl)}">${formatPnl(p.upl)}</td>
            <td class="pnl-cell ${pnlClass(p.upl_ratio)}">${(p.upl_ratio * 100).toFixed(2)}%</td>
            <td>${p.lever}×</td>
          </tr>
        `;}).join("")}
      </tbody>
    </table>
  `;
  document.getElementById("positions-table").innerHTML = html;
}

function renderClosed(closes) {
  const panel = document.getElementById("closed-panel");
  if (!closes.length) { panel.style.display = "none"; return; }
  panel.style.display = "";
  document.getElementById("closed-count").textContent = `最近 ${closes.length} 笔`;

  const html = `
    <table>
      <thead>
        <tr>
          <th>时间</th>
          <th>合约</th>
          <th>方向</th>
          <th>盈亏</th>
          <th>手续费</th>
          <th>净收益</th>
        </tr>
      </thead>
      <tbody>
        ${closes.slice(0, 30).map(c => `
          <tr>
            <td>${formatTime(c.ts)}</td>
            <td><strong>${c.symbol}</strong></td>
            <td><span class="badge ${c.side === 'long' ? 'LONG' : 'SHORT'}">${c.side === 'long' ? '平多' : '平空'}</span></td>
            <td class="pnl-cell ${pnlClass(c.pnl)}">${formatPnl(c.pnl)}</td>
            <td>${c.fee.toFixed(4)}</td>
            <td class="pnl-cell ${pnlClass(c.net)}">${formatPnl(c.net)}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
  document.getElementById("closed-table").innerHTML = html;
}

function formatPnl(v) {
  if (v == null || isNaN(v)) return "—";
  const n = Number(v);
  const sign = n > 0 ? "+" : "";
  return sign + n.toFixed(2);
}

function pnlClass(v) {
  const n = Number(v);
  if (isNaN(n) || n === 0) return "";
  return n > 0 ? "pnl-positive" : "pnl-negative";
}

loadSignals();
loadPnL();
setInterval(loadSignals, 60_000);
setInterval(loadPnL, 60_000);
</script>
</body>
</html>
